server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_market?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci;
  jpa:
    hibernate:
      ddl-auto: drop-create
    show-sql: true
    properties:
      hibernate:
        connection:
          characterEncoding: UTF-8
          charSet: UTF-8
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# 🔥 JWT 配置 (纯 JJWT)
jwt:
  secret: campus_market_jwt_secret_key_2024_must_be_at_least_256_bits_long_for_security!!!
  expiration: 86400000 # 24小时 (毫秒)

logging:
  level:
    root: INFO
    com.campus.marketplace: DEBUG
    org.springframework.security: DEBUG

ai:
